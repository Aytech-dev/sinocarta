<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Classic Connect 03</title>

  <!-- MAIN CSS FILE -->
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/classic-connect.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
</head>

<body class="connect-03-body">

  <main class="connect-03-page">

    <!-- TOP BAR -->
    <header class="connect-03-header">
      <div class="connect-03-logo">
        <img src="../../images/Sinocarta-logo.png" alt="Sinocarta Logo">
        <span>Sinocarta</span>
      </div>

      <a href="sinocarta1.vcf" class="connect-03-save">
        <i class="fas fa-download"></i>
        Save
      </a>
    </header>

    <!-- HERO PROFILE -->
    <section class="connect-03-profile">
      <div class="connect-03-img">
        <img src="../../images/Olamide.PNG" alt="Profile Photo">
      </div>

      <h1>Ayoscomic Hub</h1>
      <h2>CEO & Founder</h2>
      <p>Aytech Phones & Gadget</p>
    </section>

    <!-- QUICK ACTIONS -->
    <section class="connect-03-actions">

      <a href="tel:+2349052978969">
        <i class="fas fa-phone"></i>
        <span>Call</span>
      </a>

      <a href="https://wa.me/2349052978969">
        <i class="fab fa-whatsapp"></i>
        <span>WhatsApp</span>
      </a>

      <a href="mailto:info@sinocarta.com">
        <i class="fas fa-envelope"></i>
        <span>Email</span>
      </a>

      <a href="https://sinocarta.com">
        <i class="fas fa-globe"></i>
        <span>Website</span>
      </a>

    </section>

    <!-- ABOUT -->
    <section class="connect-03-card">
      <h3>About</h3>
      <p>
        Helping brands and people build strong digital identity with smart NFC business cards.
      </p>
    </section>

    <!-- LINKS -->
    <section class="connect-03-links">

      <a href="https://www.instagram.com/aytech_comedy5">
        <div>
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
        </div>
        <i class="fas fa-arrow-right"></i>
      </a>

      <a href="https://www.tiktok.com/@ayoscomic">
        <div>
          <i class="fab fa-tiktok"></i>
          <span>TikTok</span>
        </div>
        <i class="fas fa-arrow-right"></i>
      </a>

      <a href="https://www.facebook.com/profile.php?id=61569678462763">
        <div>
          <i class="fab fa-facebook-f"></i>
          <span>Facebook</span>
        </div>
        <i class="fas fa-arrow-right"></i>
      </a>

      <a href="https://sinocarta.com">
        <div>
          <i class="fas fa-link"></i>
          <span>Website</span>
        </div>
        <i class="fas fa-arrow-right"></i>
      </a>

    </section>

    <!-- FOOTER -->
    <footer class="connect-03-footer">
      <p>Powered by <strong>Sinocarta</strong></p>
      <span>Tap. Connect. Be Remembered.</span>
    </footer>

  </main>

</body>
</html>
