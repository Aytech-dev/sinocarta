<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Classic Connect 02</title>

  <!-- MAIN CSS FILE -->
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/classic-connect.css" />
  <link rel="stylesheet" href="../../css/responsive.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >
</head>

<body class="connect-02-body">

  <main class="connect-02-page">

    <!-- TOP BAR -->
    <header class="connect-02-header">
      <div class="connect-02-logo">
        <img src="../../images/Sinocarta-logo.png" alt="Sinocarta Logo">
        <span>Sinocarta</span>
      </div>

      <button class="connect-02-menu">
        <i class="fas fa-ellipsis-h"></i>
      </button>
    </header>

    <!-- PROFILE -->
    <section class="connect-02-profile">
      <div class="connect-02-img">
        <img src="../../images/Ayomide.jpeg" alt="Profile Photo">
      </div>

      <h1>Ayoscomic Hub</h1>
      <h2>CEO & Founder</h2>
      <p>Sinocarta One tap</p>
    </section>

    <!-- CONTACT LIST -->
    <section class="connect-02-list">

      <a href="tel:+2349052978969">
        <div class="connect-02-icon phone">
          <i class="fas fa-phone"></i>
        </div>

        <div>
          <strong>Call</strong>
          <span>+234 905 297 8969</span>
        </div>

        <i class="fas fa-chevron-right arrow"></i>
      </a>

      <a href="https://wa.me/2349052978969">
        <div class="connect-02-icon whatsapp">
          <i class="fab fa-whatsapp"></i>
        </div>

        <div>
          <strong>WhatsApp</strong>
          <span>Message me</span>
        </div>

        <i class="fas fa-chevron-right arrow"></i>
      </a>

      <a href="mailto:info@sinocarta.com">
        <div class="connect-02-icon email">
          <i class="fas fa-envelope"></i>
        </div>

        <div>
          <strong>Email</strong>
          <span>info@sinocarta.com</span>
        </div>

        <i class="fas fa-chevron-right arrow"></i>
      </a>

      <a href="sinocarta1.vcf">
        <div class="connect-02-icon save">
          <i class="fas fa-user"></i>
        </div>

        <div>
          <strong>Save Contact</strong>
          <span>Add to your contacts</span>
        </div>

        <i class="fas fa-download arrow"></i>
      </a>

    </section>

    <!-- CONNECT -->
    <section class="connect-02-social-section">
      <div class="connect-02-title">
        <span></span>
        <p>Connect</p>
        <span></span>
      </div>

      <div class="connect-02-socials">

        <a href="https://www.instagram.com/aytech_comedy5">
          <i class="fab fa-instagram"></i>
        </a>

        <a href="https://www.tiktok.com/@ayoscomic">
          <i class="fab fa-tiktok"></i>
        </a>

        <a href="https://www.facebook.com/profile.php?id=61569678462763">
          <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://sinocarta.com">
          <i class="fas fa-globe"></i>
        </a>

      </div>
    </section>

    <!-- FOOTER -->
    <footer class="connect-02-footer">
      <img src="../../images/Sinocarta-logo.png"Sinocarta Logo">
      <p>Powered by Sinocarta</p>
      <span>Digital Business Card Solution</span>
    </footer>

  </main>

</body>
</html>
